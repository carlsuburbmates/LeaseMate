<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>LeaseMate — Move-Out Made Simple</title>
    <meta name="description" content="LeaseMate connects Melbourne renters with vetted move-out service providers. Build your Move-Out Cart and get matched with removalists, cleaners, carpet cleaners, pest control, rubbish removal, and handyman services." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..700;1,14..32,300..700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics: only injected when VITE_ANALYTICS_ENDPOINT and VITE_ANALYTICS_WEBSITE_ID are set.
         This avoids Vite build warnings when running locally without these env vars. -->
    <script type="module">
      const endpoint = import.meta.env.VITE_ANALYTICS_ENDPOINT;
      const websiteId = import.meta.env.VITE_ANALYTICS_WEBSITE_ID;
      if (endpoint && websiteId) {
        const s = document.createElement('script');
        s.defer = true;
        s.src = endpoint + '/umami';
        s.setAttribute('data-website-id', websiteId);
        document.head.appendChild(s);
      }
    </script>
  </body>

</html>
